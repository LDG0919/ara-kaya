<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ara-Kaya — Independent app development studio</title>
<meta name="description" content="Independent app development studio. We build calm, focused apps.">
<meta property="og:title" content="Ara-Kaya">
<meta property="og:description" content="Independent app development studio">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --text-primary: #1e3a52;
    --text-secondary: #5a7589;
    --text-tertiary: #6b8a9e;
    --accent: #4a8db8;
    --accent-light: #7ab5d4;
    --card-bg: #ffffff;
    --border: rgba(74, 141, 184, 0.15);
    --border-strong: rgba(74, 141, 184, 0.3);
    --bg-gradient: linear-gradient(180deg, #e8f1f8 0%, #f5f9fc 40%, #ffffff 100%);
    --wave-1: #7ab5d4;
    --wave-2: #5a9bc4;
    --wave-3: #4a8db8;
    --coming-soon-bg: rgba(255, 255, 255, 0.4);
  }

  [data-theme="dark"] {
    --text-primary: #e8f1f8;
    --text-secondary: #a8c0d0;
    --text-tertiary: #7a95a8;
    --accent: #7ab5d4;
    --accent-light: #a8d0e6;
    --card-bg: rgba(30, 58, 82, 0.5);
    --border: rgba(122, 181, 212, 0.15);
    --border-strong: rgba(122, 181, 212, 0.3);
    --bg-gradient: linear-gradient(180deg, #0d1f2d 0%, #1a3149 50%, #0d1f2d 100%);
    --wave-1: #2a5a7a;
    --wave-2: #1f4560;
    --wave-3: #163349;
    --coming-soon-bg: rgba(30, 58, 82, 0.2);
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    position: relative;
    transition: background 0.6s ease, color 0.6s ease;
  }

  .stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 60vh;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  [data-theme="dark"] .stars {
    opacity: 1;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .waves {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 100%;
  }

  .wave svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .wave svg path {
    transition: fill 0.6s ease;
  }

  .wave-1 {
    animation: waveMove 18s ease-in-out infinite;
    opacity: 0.5;
  }

  .wave-2 {
    animation: waveMove 24s ease-in-out infinite reverse;
    opacity: 0.35;
  }

  .wave-3 {
    animation: waveMove 30s ease-in-out infinite;
    opacity: 0.25;
  }

  @keyframes waveMove {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-25%); }
  }

  /* 토글 버튼 — 버튼 테두리/배경 제거, 아이콘만 */
  .theme-toggle {
    position: fixed;
    top: 36px;
    width: 48px;
    height: 48px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 0;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .theme-toggle:hover {
    transform: scale(1.12);
  }

  .theme-toggle:active {
    transform: scale(0.92);
  }

  .toggle-star { left: 36px; }
  .toggle-sun-moon { right: 36px; }

  .theme-toggle svg {
    width: 32px;
    height: 32px;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* 별 아이콘 - 라이트모드에선 은은한 윤곽만, 다크모드에선 따뜻하게 빛남 */
  .star-icon {
    color: var(--text-tertiary);
    opacity: 0.5;
  }

  .theme-toggle:hover .star-icon {
    opacity: 0.85;
  }

  [data-theme="dark"] .star-icon {
    color: #fff4d6;
    opacity: 0.95;
    filter: drop-shadow(0 0 8px rgba(255, 230, 160, 0.5))
            drop-shadow(0 0 16px rgba(255, 217, 125, 0.3));
  }

  /* 해/달 — 부드러운 색감과 글로우 */
  .sun-icon, .moon-icon {
    position: absolute;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .sun-icon {
    color: #e8a85c;
    opacity: 0.65;
    transform: rotate(0deg) scale(1);
    filter: drop-shadow(0 0 6px rgba(232, 168, 92, 0.25));
  }

  .theme-toggle:hover .sun-icon {
    opacity: 0.9;
    filter: drop-shadow(0 0 10px rgba(232, 168, 92, 0.4));
  }

  .moon-icon {
    color: #d8e4f0;
    opacity: 0;
    transform: rotate(-90deg) scale(0.5);
  }

  [data-theme="dark"] .sun-icon {
    opacity: 0;
    transform: rotate(90deg) scale(0.5);
  }

  [data-theme="dark"] .moon-icon {
    opacity: 0.85;
    transform: rotate(0deg) scale(1);
    filter: drop-shadow(0 0 10px rgba(216, 228, 240, 0.4))
            drop-shadow(0 0 20px rgba(180, 200, 220, 0.2));
  }

  [data-theme="dark"] .theme-toggle:hover .moon-icon {
    opacity: 1;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 100px 32px 60px;
    position: relative;
    z-index: 1;
  }

  .header {
    margin-bottom: 80px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.2s forwards;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(40px, 7vw, 56px);
    font-weight: 500;
    letter-spacing: -1.5px;
    color: var(--text-primary);
    margin-bottom: 20px;
    line-height: 1.1;
  }

  .tagline {
    font-size: 17px;
    color: var(--text-secondary);
    line-height: 1.7;
    max-width: 480px;
  }

  .tagline-kr {
    display: block;
    margin-top: 4px;
    font-size: 15px;
    color: var(--text-tertiary);
  }

  .section {
    margin-bottom: 64px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.5s forwards;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  .apps {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .app-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 22px 26px;
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    color: inherit;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .app-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(122, 181, 212, 0.08), transparent);
    transition: left 0.8s ease;
  }

  .app-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-strong);
    box-shadow: 0 8px 24px -8px rgba(74, 141, 184, 0.18);
  }

  .app-card:hover::before {
    left: 100%;
  }

  .app-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, #7ab5d4, #4a8db8);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.5px;
  }

  .app-info {
    flex: 1;
    min-width: 0;
  }

  .app-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 3px;
  }

  .app-desc {
    font-size: 13.5px;
    color: var(--text-tertiary);
    line-height: 1.5;
  }

  .app-arrow {
    color: var(--accent-light);
    font-size: 18px;
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .app-card:hover .app-arrow {
    transform: translateX(4px);
    color: var(--accent);
  }

  .app-card.coming-soon {
    border-style: dashed;
    background: var(--coming-soon-bg);
    cursor: default;
  }

  .app-card.coming-soon:hover {
    transform: none;
    box-shadow: none;
    border-color: var(--border);
  }

  .app-card.coming-soon .app-icon {
    background: var(--border-strong);
    opacity: 0.5;
  }

  .app-card.coming-soon .app-name {
    color: var(--text-tertiary);
  }

  .footer {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.8s forwards;
  }

  .contact a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.3s ease;
  }

  .contact a:hover {
    color: var(--accent);
  }

  .copyright {
    font-size: 13px;
    color: var(--text-tertiary);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .container { padding: 80px 24px 40px; }
    .header { margin-bottom: 60px; }
    .footer { margin-top: 60px; }
    .app-card { padding: 18px 20px; }
    .theme-toggle {
      top: 24px;
    }
    .toggle-star { left: 24px; }
    .toggle-sun-moon { right: 24px; }
    .theme-toggle svg {
      width: 28px;
      height: 28px;
    }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="waves">
  <div class="wave wave-1">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path fill="var(--wave-1)" fill-opacity="0.4" d="M0,192L48,197.3C96,203,192,213,288,202.7C384,192,480,160,576,165.3C672,171,768,213,864,218.7C960,224,1056,192,1152,170.7C1248,149,1344,139,1392,133.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>

    </svg>
  </div>
</div>

<button class="theme-toggle toggle-star" id="toggleStar" aria-label="Toggle theme">
  <svg class="star-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2L14.39 8.79L21.5 9.27L16.04 13.97L17.77 21.02L12 17.27L6.23 21.02L7.96 13.97L2.5 9.27L9.61 8.79L12 2Z"/>
  </svg>
</button>

<button class="theme-toggle toggle-sun-moon" id="toggleSunMoon" aria-label="Toggle theme">
  <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="4" fill="currentColor"/>
    <line x1="12" y1="2" x2="12" y2="5"/>
    <line x1="12" y1="19" x2="12" y2="22"/>
    <line x1="2" y1="12" x2="5" y2="12"/>
    <line x1="19" y1="12" x2="22" y2="12"/>
    <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
    <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
    <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
    <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
  </svg>
  <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>
  </svg>
</button>

<div class="container">

  <header class="header">
    <div class="eyebrow">Studio</div>
    <h1>Ara-Kaya</h1>
    <p class="tagline">
      Independent app development studio.
      <span class="tagline-kr">잔잔하게, 그러나 꾸준히 만들어 갑니다.</span>
    </p>
  </header>

  <section class="section">
    <div class="section-label">Apps</div>
    <div class="apps">

      <a href="#" class="app-card">
        <div class="app-icon">A</div>
        <div class="app-info">
          <div class="app-name">Abak Futures Calc</div>
          <div class="app-desc">PnL & liquidation price calculator for crypto futures trading</div>
        </div>
        <div class="app-arrow">→</div>
      </a>

      <div class="app-card coming-soon">
        <div class="app-icon"></div>
        <div class="app-info">
          <div class="app-name">Coming soon</div>
          <div class="app-desc">다음 파도가 오는 중</div>
        </div>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="contact">
      <a href="mailto:ldgu0919@naver.com">ldgu0919@naver.com</a>
    </div>
    <div class="copyright">© 2026 Ara-Kaya</div>
  </footer>

</div>

<script>
  const starsContainer = document.getElementById('stars');
  const starCount = 50;
  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (Math.random() * 2 + 2) + 's';
    starsContainer.appendChild(star);
  }

  const html = document.documentElement;
  const toggleStar = document.getElementById('toggleStar');
  const toggleSunMoon = document.getElementById('toggleSunMoon');

  const savedTheme = localStorage.getItem('theme');
  if (savedTheme) {
    html.setAttribute('data-theme', savedTheme);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    html.setAttribute('data-theme', 'dark');
  }

  function toggleTheme() {
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }

  toggleStar.addEventListener('click', toggleTheme);
  toggleSunMoon.addEventListener('click', toggleTheme);
</script>

</body>
</html>
